name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Server dependencies
      - name: Install server dependencies
        run: |
          cd server
          npm ci

      # Client dependencies
      - name: Install client dependencies
        run: |
          cd client
          npm ci

      - name: Build client
        run: |
          cd client
          npm run build

      - name: Lint client code
        run: |
          cd client
          npm run lint

      - name: Run basic sanity
        run: echo "No tests configured yet"

      # Deployment step placeholder (set up provider secrets accordingly)
      - name: Deploy to server (placeholder)
        if: false
        run: |
          echo "Add deployment commands here (Heroku/Netlify/Vercel/Docker)"
